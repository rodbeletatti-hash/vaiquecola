name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject Supabase credentials and version
        run: |
          cat > js/config.js << 'JSEOF'
          // ─── Configuração do Supabase (gerado pelo CI) ─────────────────────
          const SUPABASE_URL      = '__SUPABASE_URL__';
          const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';
          const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
          JSEOF
          sed -i "s|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g"      js/config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${{ secrets.SUPABASE_ANON_KEY }}|g" js/config.js
          # Injeta hash do commit no HTML e no sw.js
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|>dev<|>${SHORT_SHA}<|g" index.html
          sed -i "s|__BUILD__|${SHORT_SHA}|g" sw.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # raiz do repositório (site estático puro)

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
